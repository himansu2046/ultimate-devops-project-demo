  selector:
    opentelemetry.io/name: opentelemetry-demo-valkey

# ===================== OTEL COLLECTOR =====================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-otelcol
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      opentelemetry.io/name: opentelemetry-demo-otelcol
  template:
    metadata:
      labels:
        opentelemetry.io/name: opentelemetry-demo-otelcol
    spec:
      containers:
        - name: otelcol
          image: {{ .Values.images.otelcol }}
          ports:
            - containerPort: 4317
            - containerPort: 4318

---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-demo-otelcol
  namespace: {{ $ns }}
spec:
  ports:
    - port: 4317
      targetPort: 4317
    - port: 4318
      targetPort: 4318
  selector:
    opentelemetry.io/name: opentelemetry-demo-otelcol

# ===================== FLAGD =====================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-flagd
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      opentelemetry.io/name: opentelemetry-demo-flagd
  template:
    metadata:
      labels:
        opentelemetry.io/name: opentelemetry-demo-flagd
    spec:
      containers:
        - name: flagd
          image: {{ .Values.images.flagd }}
          args: ["start", "--uri", "file:/etc/flagd/demo.flagd.json"]
          volumeMounts:
            - name: config
              mountPath: /etc/flagd
      volumes:
        - name: config
          configMap:
            name: opentelemetry-demo-flagd-config

---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-demo-flagd
  namespace: {{ $ns }}
spec:
  ports:
    - port: 8013
      targetPort: 8013
  selector:
    opentelemetry.io/name: opentelemetry-demo-flagd

# ===================== CONFIGMAP =====================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opentelemetry-demo-flagd-config
  namespace: {{ $ns }}
data:
  demo.flagd.json: |
    {
      "flags": {
        "adServiceFailure": {
          "state": "ENABLED",
          "variants": { "on": true, "off": false },
          "defaultVariant": "off"
        }
      }
    }
