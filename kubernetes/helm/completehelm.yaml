{{- $ns := .Values.namespace }}

---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentelemetry-demo
  namespace: {{ $ns }}

# ===================== SERVICES =====================

{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-demo-{{ $name }}
  namespace: {{ $ns }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
  selector:
    opentelemetry.io/name: opentelemetry-demo-{{ $name }}
{{- end }}

# ===================== DEPLOYMENTS =====================

{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-{{ $name }}
  namespace: {{ $ns }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      opentelemetry.io/name: opentelemetry-demo-{{ $name }}
  template:
    metadata:
      labels:
        opentelemetry.io/name: opentelemetry-demo-{{ $name }}
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
        - name: {{ $name }}
          image: {{ index $.Values.images $name }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ $name }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name={{ $name }},service.namespace={{ $ns }}
{{- end }}

# ===================== KAFKA =====================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-kafka
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      opentelemetry.io/name: opentelemetry-demo-kafka
  template:
    metadata:
      labels:
        opentelemetry.io/name: opentelemetry-demo-kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          ports:
            - containerPort: 9092
            - containerPort: 9093

---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-demo-kafka
  namespace: {{ $ns }}
spec:
  ports:
    - port: 9092
      targetPort: 9092
    - port: 9093
      targetPort: 9093
  selector:
    opentelemetry.io/name: opentelemetry-demo-kafka

# ===================== VALKEY =====================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-valkey
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      opentelemetry.io/name: opentelemetry-demo-valkey
  template:
    metadata:
      labels:
        opentelemetry.io/name: opentelemetry-demo-valkey
    spec:
      containers:
        - name: valkey
          image: {{ .Values.images.valkey }}
          ports:
